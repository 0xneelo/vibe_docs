name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify changelog dates file matches git history
        run: |
          python Website/scripts/generate_changelog_dates.py
          git diff --exit-code -- Website/src/data/changelog-dates.generated.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Vite 8 requires ^20.19.0 or >=22.12.0; bare "20" can be an older 20.x on the runner.
          node-version: 22
          cache: npm
          cache-dependency-path: Website/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements-docs-site.txt
        working-directory: Website

      - name: Install npm deps
        run: npm ci
        working-directory: Website

      - name: Prebuild (docs data, changelog dates, link check)
        run: python scripts/prebuild.py
        working-directory: Website

      - name: Build website (Vite)
        run: npx vite build
        working-directory: Website
        env:
          VITE_BASE_PATH: /vibe_docs/
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Add SPA fallback
        run: cp site/index.html site/404.html
        working-directory: Website

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Website/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
